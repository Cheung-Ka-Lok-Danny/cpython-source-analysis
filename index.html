<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Python源码解析——深度剖析CPython">
  <title>Python源码解析 · 深度剖析CPython</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">

  <!-- Docsify 主题 CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <!-- Mermaid 支持 -->
  <script>
    window.$docsify = {
      name: "Python源码解析",
      nameLink: "/",
      repo: "https://github.com/Cheung-Ka-Lok-Danny/cpython-source-analysis",
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      maxLevel: 4,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: "搜索文档...",
        noData: "没有找到结果",
        depth: 4,
        paths: 'auto',
        hideOtherSidebarContent: false,
        namespace: 'cpython-docs'
      },
      copyCode: {
        buttonText: "复制",
        errorText: "复制失败",
        successText: "已复制"
      },
      pagination: {
        previousText: "上一节",
        nextText: "下一节",
        crossChapter: true
      },
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic'
      },
      count: {
        countable: true,
        fontsize: '0.9em',
        color: 'rgb(90, 90, 90)',
        language: 'chinese'
      },
      progress: {
        minimum: 0.1
      },
      corner: {
        url: "https://github.com/Cheung-Ka-Lok-Danny/cpython-source-analysis",
        icon: "github"
      },
      // Mermaid 配置
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function(hook) {
          // Mermaid 初始化
          var mermaidLoaded = false;
          hook.doneEach(function() {
            if (!mermaidLoaded) {
              var script = document.createElement('script');
              script.src = '//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js';
              script.onload = function() {
                mermaid.initialize({
                  startOnLoad: true,
                  theme: (document.documentElement.getAttribute('data-theme') === 'dark' ||
                          window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'default',
                  securityLevel: 'loose',
                  flowchart: { useMaxWidth: true, htmlLabels: true },
                  sequence: { useMaxWidth: true },
                  gantt: { useMaxWidth: true }
                });
                mermaidLoaded = true;
              };
              document.body.appendChild(script);
            } else {
              var isDark = document.documentElement.getAttribute('data-theme') === 'dark' ||
                           window.matchMedia('(prefers-color-scheme: dark)').matches;
              mermaid.initialize({ theme: isDark ? 'dark' : 'default' });
              mermaid.init(undefined, document.querySelectorAll('.mermaid'));
            }
          });
        }
      ]
    };
  </script>
</head>
<body>
  <div id="app"></div>
  <button id="back-to-top" title="返回顶部" aria-label="返回顶部">↑</button>

  <!-- Docsify 核心 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- 代码复制 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>

  <!-- 分页导航 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>

  <!-- 字数统计 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-count@latest/dist/countable.min.js"></script>

  <!-- 标签页 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>

  <!-- Progress Bar -->
  <script src="//cdn.jsdelivr.net/npm/docsify-progress@1/dist/progress.min.js"></script>

  <!-- 图片缩放 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>

  <!-- emoji -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>

  <!-- 外部脚本 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/external-script.min.js"></script>

  <!-- 侧边栏折叠 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>

  <!-- KaTeX 数学公式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@0/dist/docsify-katex.min.js"></script>

  <!-- 主题切换脚本 -->
  <script>
    (function() {
      var DARK_KEY = 'cpython-docs-theme';
      var html = document.documentElement;

      var saved = localStorage.getItem(DARK_KEY);
      if (saved === 'dark') html.setAttribute('data-theme', 'dark');
      else if (saved === 'light') html.setAttribute('data-theme', 'light');

      function insertToggle() {
        var nav = document.querySelector('.app-nav');
        if (!nav) { setTimeout(insertToggle, 200); return; }

        var li = document.createElement('li');
        li.className = 'theme-toggle-li';
        var btn = document.createElement('button');
        btn.className = 'theme-toggle-btn';
        btn.setAttribute('aria-label', '切换暗色/亮色主题');
        btn.title = '切换暗色/亮色主题';
        btn.innerHTML = '<svg class="theme-icon sun-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg class="theme-icon moon-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

        function updateIcon() {
          var isDark = html.getAttribute('data-theme') === 'dark';
          btn.classList.toggle('dark', isDark);
        }

        btn.onclick = function() {
          var current = html.getAttribute('data-theme');
          var next = current === 'dark' ? 'light' : 'dark';
          html.setAttribute('data-theme', next);
          localStorage.setItem(DARK_KEY, next);
          updateIcon();
          if (window.mermaid) {
            mermaid.initialize({ theme: next === 'dark' ? 'dark' : 'default' });
            mermaid.init(undefined, document.querySelectorAll('.mermaid'));
          }
        };

        updateIcon();
        li.appendChild(btn);
        nav.appendChild(li);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', insertToggle);
      } else {
        insertToggle();
      }

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem(DARK_KEY)) {
          html.setAttribute('data-theme', e.matches ? 'dark' : 'light');
          var btn = document.querySelector('.theme-toggle-btn');
          if (btn) btn.classList.toggle('dark', e.matches);
        }
      });
    })();
  </script>

  <style>
    /* ================================================================
       DESIGN SYSTEM — Clean & Professional
       Inspired by: VitePress / Tailwind / Linear
       ================================================================ */

    /* ── Light Theme Tokens ── */
    :root {
      /* Accent */
      --accent:        #3b5998;
      --accent-soft:   #eef2ff;
      --accent-border: #c7d2fe;
      --accent-hover:  #2d4373;

      /* Surface */
      --bg-body:       #ffffff;
      --bg-sidebar:    #f8fafc;
      --bg-code:       #1e293b;
      --bg-blockquote: #f8fafc;
      --bg-mermaid:    #f8fafc;
      --bg-table-even: #f8fafc;
      --bg-table-hover:#f1f5f9;

      /* Text */
      --text-primary:  #0f172a;
      --text-secondary:#475569;
      --text-muted:    #94a3b8;
      --text-link:     var(--accent);
      --text-code:     #334155;

      /* Borders */
      --border-light:   #e2e8f0;
      --border-sidebar: #e2e8f0;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 25px rgba(0,0,0,.08);

      /* Radii */
      --radius-sm:  6px;
      --radius-md:  8px;
      --radius-lg: 12px;

      /* Layout */
      --sidebar-w:  17rem;
      --content-max: 820px;

      /* Type */
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", Menlo, Monaco, Consolas, monospace;

      /* Docsify-themeable overrides */
      --theme-color:                            var(--accent);
      --sidebar-width:                          var(--sidebar-w);
      --sidebar-nav-link-color:                 var(--text-secondary);
      --sidebar-nav-link-color--active:         var(--accent);
      --sidebar-nav-link-font-weight--active:   600;
      --sidebar-nav-link-padding:              .3em 1em;
      --content-max-width:                      var(--content-max);
      --content-padding-top:                    1.5rem;
      --base-font-size:                         16px;
      --base-line-height:                       1.75;
      --heading-color:                          var(--text-primary);
      --text-color:                             var(--text-primary);
      --link-color:                             var(--text-link);
      --code-theme-background:                  var(--bg-code);
      --code-theme-text:                        #cbd5e1;
      --code-font-size:                         .88em;
      --code-font-family:                       var(--font-mono);

      /* Cover */
      --cover-background-color:                 linear-gradient(135deg, #1e293b 0%, #334155 40%, #475569 100%);
      --cover-color:                            #fff;
      --cover-button-color:                     #fff;
      --cover-button-background:                rgba(255,255,255,.1);
      --cover-button-border:                    1px solid rgba(255,255,255,.25);
      --cover-button-border-radius:             8px;
      --cover-button-padding:                   .7em 2em;
      --cover-button-font-size:                 1rem;
      --cover-button-primary-background:        var(--accent);
      --cover-button-primary-color:             #fff;
      --cover-button-primary-border:            none;
      --cover-button-primary-font-weight:       600;

      --navbar-root-color:                      #fff;
      --navbar-root-background:                 var(--accent);
      --navbar-root-border-color:               transparent;
      --navbar-menu-link-color:                 #0f172a;
    }

    /* ── Base ── */
    body {
      font-family: var(--font-body);
      font-size: var(--base-font-size);
      line-height: var(--base-line-height);
      color: var(--text-primary);
      background: var(--bg-body);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Content ── */
    .markdown-section {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 1.5rem 2.5rem 4rem;
    }

    .markdown-section h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -.01em;
      color: var(--text-primary);
      border-bottom: 2px solid var(--border-light);
      padding-bottom: .5rem;
      margin: 2rem 0 1rem;
    }

    .markdown-section h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-light);
      padding-bottom: .35rem;
      margin: 2rem 0 .8rem;
    }

    .markdown-section h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 1.6rem 0 .6rem;
    }

    .markdown-section h4 {
      font-size: 1.02rem;
      font-weight: 650;
      color: var(--text-secondary);
      margin: 1.2rem 0 .5rem;
    }

    .markdown-section p { margin: .7em 0; }

    .markdown-section a {
      color: var(--text-link);
      text-decoration: none;
      font-weight: 500;
      transition: color .15s;
    }
    .markdown-section a:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ── Code ── */
    .markdown-section pre {
      background: var(--bg-code);
      border-radius: var(--radius-md);
      margin: 1em 0;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0,0,0,.08);
    }
    .markdown-section pre code {
      color: #cbd5e1;
      font-size: var(--code-font-size);
      font-family: var(--font-mono);
      line-height: 1.6;
    }
    .markdown-section code { font-family: var(--font-mono); font-size: var(--code-font-size); }
    .markdown-section p code,
    .markdown-section li code,
    .markdown-section td code {
      background: var(--accent-soft);
      color: var(--accent);
      padding: .1em .45em;
      border-radius: 4px;
      font-size: .85em;
      font-weight: 500;
      border: 1px solid var(--accent-border);
    }

    /* ── Blockquote ── */
    .markdown-section blockquote {
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      padding: .8em 1.1em;
      margin: 1em 0;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--text-secondary);
    }
    .markdown-section blockquote p { margin: .2em 0; }

    /* ── Tables ── */
    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: .93em;
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .markdown-section table thead { background: var(--accent); color: #fff; }
    .markdown-section table thead th {
      padding: .65em 1em;
      font-weight: 700;
      text-align: left;
      font-size: .9em;
    }
    .markdown-section table tbody tr { border-bottom: 1px solid var(--border-light); }
    .markdown-section table tbody tr:last-child { border-bottom: none; }
    .markdown-section table tbody tr:nth-child(even) { background: var(--bg-table-even); }
    .markdown-section table tbody tr:hover { background: var(--bg-table-hover); }
    .markdown-section table tbody td { padding: .55em 1em; }

    /* ── Mermaid ── */
    .markdown-section .mermaid {
      display: flex; justify-content: center;
      margin: 1.2em 0; padding: 1em;
      background: var(--bg-mermaid);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-sidebar);
    }
    .sidebar-nav { padding: .3em 0; }
    .sidebar-nav > ul { padding-left: 0; }
    .sidebar-nav li > a {
      transition: all .15s;
      border-radius: 0 5px 5px 0;
      margin-right: .5em;
      font-size: .91em;
      color: var(--text-secondary);
    }
    .sidebar-nav li > a:hover { background: var(--accent-soft); color: var(--accent); }
    .sidebar-nav li.active > a {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 650;
    }
    .sidebar-nav .app-sub-sidebar li > a { font-size: .86em; padding-left: 2em; }
    .sidebar-nav strong {
      display: block;
      font-size: .76em;
      letter-spacing: .06em;
      color: var(--text-muted);
      padding: .7em 1.2em .2em;
      font-weight: 700;
    }
    .sidebar > .app-name-link { font-size: 1.1rem; font-weight: 750; color: var(--text-primary); }

    /* ── Navbar ── */
    .app-nav { margin: 14px 60px 0 0; }
    .app-nav a {
      color: #fff !important;
      font-size: .9em;
      padding: .3em .8em;
      border-radius: 6px;
      transition: background .15s;
      font-weight: 500;
    }
    .app-nav a:hover { background: rgba(255,255,255,.12); }
    .app-nav li ul {
      background: #fff;
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-light);
    }
    .app-nav li ul a { color: var(--text-primary) !important; }

    /* ── Theme Toggle Button ── */
    .theme-toggle-li { margin-left: .3em; }
    .theme-toggle-btn {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      cursor: pointer;
      padding: .3em .55em;
      border-radius: 6px;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .theme-toggle-btn:hover { background: rgba(255,255,255,.18); }
    .theme-icon { transition: transform .4s cubic-bezier(.4,0,.2,1), opacity .3s; position: relative; }
    .sun-icon, .moon-icon { position: relative; }
    .sun-icon { opacity: 1; transform: rotate(0) scale(1); }
    .moon-icon { opacity: 0; transform: rotate(-90deg) scale(.6); position: absolute; }
    .theme-toggle-btn.dark .sun-icon { opacity: 0; transform: rotate(90deg) scale(.6); }
    .theme-toggle-btn.dark .moon-icon { opacity: 1; transform: rotate(0) scale(1); }

    /* ── Cover ── */
    section.cover { background: var(--cover-background-color) !important; }
    section.cover .cover-main { margin-top: 10vh; }
    section.cover .cover-main > p:first-child {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: -.01em;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,.15);
      margin-bottom: .2em;
    }
    section.cover .cover-main > p:last-child {
      display: flex; gap: .7em; justify-content: center; flex-wrap: wrap;
    }
    section.cover .cover-main > p:last-child a {
      transition: all .25s; border-radius: 8px;
    }
    section.cover .cover-main > p:last-child a:first-child {
      background: #fff;
      color: var(--accent);
      font-weight: 700;
    }
    section.cover .cover-main > p:last-child a:first-child:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(255,255,255,.25);
    }
    section.cover .cover-main > p:last-child a:last-child:hover {
      background: rgba(255,255,255,.18);
    }
    section.cover blockquote {
      border-left: 3px solid rgba(255,255,255,.4);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.85);
      max-width: 600px;
      margin: .8em auto;
      font-size: 1.05em;
    }
    section.cover .cover-main ul {
      list-style: none; padding: 0;
      display: flex; flex-wrap: wrap; justify-content: center; gap: .4em;
      margin: 1.2em 0; font-size: .92em;
    }
    section.cover .cover-main ul li {
      background: rgba(255,255,255,.1);
      padding: .35em .9em; border-radius: 20px;
      color: rgba(255,255,255,.9);
    }

    /* ── Search ── */
    .search .results-panel { max-height: 70vh; }
    .search .matching-post { border-bottom: 1px solid var(--border-light); padding: .5em 0; }
    .search .matching-post .h2 { color: var(--accent); font-weight: 600; }

    /* ── Pagination ── */
    .docsify-pagination-container {
      border-top: 1px solid var(--border-light);
      padding-top: 1.5rem; margin-top: 3rem;
    }
    .pagination-item-label { color: var(--text-muted); font-size: .8em; }
    .pagination-item-title { color: var(--accent); font-weight: 650; }

    /* ── GitHub Corner ── */
    .github-corner svg { fill: var(--accent); color: #fff; }

    /* ── Copy Code Button ── */
    .docsify-copy-code-button {
      font-size: .75em !important;
      border-radius: 4px !important;
      border: 1px solid rgba(255,255,255,.1) !important;
      background: rgba(255,255,255,.05) !important;
      color: rgba(255,255,255,.45) !important;
      transition: all .15s !important;
      top: .4em !important; right: .4em !important;
    }
    .docsify-copy-code-button:hover {
      background: rgba(255,255,255,.12) !important;
      color: #fff !important;
    }

    /* ── Progress Bar ── */
    .progress { background: var(--accent) !important; height: 2px !important; }

    /* ── Scrollbar ── */
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .sidebar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* ── Back to Top ── */
    #back-to-top {
      position: fixed; bottom: 2rem; right: 2rem;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; box-shadow: var(--shadow-md);
      opacity: 0; transform: translateY(8px);
      transition: all .25s; z-index: 100; pointer-events: none;
    }
    #back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #back-to-top:hover { background: var(--accent-hover); transform: translateY(-2px); }

    /* ── Page Transition ── */
    .markdown-section { animation: fadeIn .25s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Responsive ── */
    @media screen and (max-width: 768px) {
      .markdown-section { padding: 1rem 1.2rem 2rem; }
      .markdown-section h1 { font-size: 1.5rem; }
      section.cover .cover-main > p:first-child { font-size: 1.8rem; }
      .app-nav { margin: 8px 40px 0 0; }
      #back-to-top { bottom: 1rem; right: 1rem; width: 36px; height: 36px; }
    }

    /* ================================================================
       DARK THEME
       ================================================================ */
    [data-theme="dark"] {
      --accent:        #818cf8;
      --accent-soft:   #1e1b4b;
      --accent-border: #3730a3;
      --accent-hover:  #a5b4fc;

      --bg-body:       #0c0a1e;
      --bg-sidebar:    #111827;
      --bg-code:       #1e293b;
      --bg-blockquote: #111827;
      --bg-mermaid:    #1e293b;
      --bg-table-even: #111827;
      --bg-table-hover:#1e293b;

      --text-primary:  #e2e8f0;
      --text-secondary:#94a3b8;
      --text-muted:    #64748b;
      --text-link:     var(--accent);
      --text-code:     #cbd5e1;

      --border-light:  #1e293b;
      --border-sidebar:#1e293b;

      --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,.4);
      --shadow-lg: 0 10px 25px rgba(0,0,0,.5);

      --theme-color:              var(--accent);
      --code-theme-text:          #cbd5e1;
      --navbar-root-background:   #111827;
      --cover-background-color:   linear-gradient(135deg, #0c0a1e 0%, #111827 50%, #1e293b 100%);
    }

    [data-theme="dark"] .sidebar-nav li.active > a,
    [data-theme="dark"] .sidebar-nav li > a:hover { background: rgba(129,140,248,.12); }
    [data-theme="dark"] .markdown-section h1 { border-bottom-color: var(--border-light); }
    [data-theme="dark"] .markdown-section h2 { border-bottom-color: var(--border-light); }
    [data-theme="dark"] .markdown-section pre { border-color: rgba(255,255,255,.05); }
    [data-theme="dark"] .markdown-section p code,
    [data-theme="dark"] .markdown-section li code,
    [data-theme="dark"] .markdown-section td code { background: rgba(129,140,248,.12); border-color: rgba(129,140,248,.2); }
    [data-theme="dark"] .github-corner svg { fill: #111827; }
    [data-theme="dark"] .sidebar::-webkit-scrollbar-thumb { background: #334155; }
    [data-theme="dark"] .sidebar::-webkit-scrollbar-thumb:hover { background: #475569; }
    [data-theme="dark"] .progress { background: var(--accent) !important; }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --accent:        #818cf8;
        --accent-soft:   #1e1b4b;
        --accent-border: #3730a3;
        --accent-hover:  #a5b4fc;
        --bg-body:       #0c0a1e;
        --bg-sidebar:    #111827;
        --bg-blockquote: #111827;
        --bg-mermaid:    #1e293b;
        --bg-table-even: #111827;
        --bg-table-hover:#1e293b;
        --text-primary:  #e2e8f0;
        --text-secondary:#94a3b8;
        --text-muted:    #64748b;
        --text-link:     var(--accent);
        --border-light:  #1e293b;
        --border-sidebar:#1e293b;
        --theme-color:   var(--accent);
        --navbar-root-background: #111827;
      }
      :root:not([data-theme="light"]) .sidebar { background: #111827; border-right-color: #1e293b; }
      :root:not([data-theme="light"]) .sidebar-nav li > a { color: #94a3b8; }
      :root:not([data-theme="light"]) .sidebar-nav li.active > a,
      :root:not([data-theme="light"]) .sidebar-nav li > a:hover { background: rgba(129,140,248,.12); color: #818cf8; }
      :root:not([data-theme="light"]) .markdown-section blockquote { background: #111827; color: #94a3b8; }
      :root:not([data-theme="light"]) .markdown-section table thead { background: #3730a3; }
      :root:not([data-theme="light"]) .markdown-section table tbody tr { border-color: #1e293b; }
      :root:not([data-theme="light"]) .markdown-section table tbody tr:nth-child(even) { background: #111827; }
      :root:not([data-theme="light"]) .markdown-section table tbody tr:hover { background: #1e293b; }
      :root:not([data-theme="light"]) .markdown-section .mermaid { background: #1e293b; border-color: #1e293b; }
      :root:not([data-theme="light"]) .markdown-section h1,
      :root:not([data-theme="light"]) .markdown-section h2 { border-bottom-color: #1e293b; }
      :root:not([data-theme="light"]) .markdown-section pre { border-color: rgba(255,255,255,.05); }
      :root:not([data-theme="light"]) .markdown-section p code,
      :root:not([data-theme="light"]) .markdown-section li code,
      :root:not([data-theme="light"]) .markdown-section td code { background: rgba(129,140,248,.12); border-color: rgba(129,140,248,.2); }
      :root:not([data-theme="light"]) .docsify-pagination-container { border-top-color: #1e293b; }
      :root:not([data-theme="light"]) .github-corner svg { fill: #111827; }
    }
  </style>
  <!-- 返回顶部 -->
  <script>
    (function() {
      var btn = document.getElementById('back-to-top');
      if (!btn) return;
      var ticking = false;
      window.addEventListener('scroll', function() {
        if (!ticking) {
          requestAnimationFrame(function() {
            btn.classList.toggle('visible', window.scrollY > 400);
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });
      btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();
  </script>
</body>
